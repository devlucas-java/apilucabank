spring:
  config:
    activate:
      on-profile: dev

  profiles:
    active: dev

  application:
    name: apilucabank

springdoc:
  override-with-generic-response: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, metrics, prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: api-lucabank

  prometheus:
    metrics:
      export:
        enabled: true